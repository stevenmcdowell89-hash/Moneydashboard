# Single Cloudflare Worker that serves BOTH the React app (static assets) and
# the JSON API (auth + D1 persistence + open-banking proxy). One deploy, one
# origin, one Cloudflare Access app. No forecast logic here — the engine runs
# client-side. The Cloudflare Workers Builds deploy command (scripts/cf-deploy.sh)
# creates the D1 database and injects database_id for you on each deploy.
name = "moneydashboard"
main = "worker/src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Static assets: the built React SPA. `wrangler deploy` uploads web/dist and
# serves it; non-matching, non-/api routes fall back to index.html (SPA).
[assets]
directory = "web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 database binding. The database was created in Cloudflare (region WNAM); its
# id is pinned here so every deploy binds the same DB. To recreate from scratch:
#   wrangler d1 create budget_planner   # then paste the new id below
[[d1_databases]]
binding = "DB"
database_name = "budget_planner"
database_id = "601287bc-202a-4cdd-ab1d-733e55476132"
migrations_dir = "migrations"

[vars]
# Cloudflare Access — set these to your team's values (README §Access).
# The Worker validates Cf-Access-Jwt-Assertion against this team's certs.
CF_ACCESS_TEAM_DOMAIN = "REPLACE_WITH_your-team.cloudflareaccess.com"
CF_ACCESS_AUD = "REPLACE_WITH_your_access_application_aud_tag"

# Local dev only: set to "true" to bypass Access JWT verification. This bypass
# is honoured ONLY while CF_ACCESS_TEAM_DOMAIN / CF_ACCESS_AUD are still the
# placeholders above. NEVER set this in production. Recommended: keep it in
# .dev.vars (gitignored) rather than committing it here.
# DEV_BYPASS_AUTH = "true"

# Secrets (set via `wrangler secret put NAME`, never commit):
#   GOCARDLESS_SECRET_ID
#   GOCARDLESS_SECRET_KEY
